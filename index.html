<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zombie Popcorn Survival</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#1a1a1a;
    font-family:Arial;
}
canvas{
    display:block;
    margin:auto;
    background:#2d5f2d;
}
#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:24px;
}
</style>
</head>
<body>

<div id="ui">
Health: <span id="health">100</span>
<br>
Score: <span id="score">0</span>
</div>

<canvas id="game" width="1000" height="650"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const player={
x:500,
y:325,
r:18,
speed:4,
health:100
};

let bullets=[];
let zombies=[];
let powerups=[];
let keys={};
let score=0;

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

canvas.addEventListener("click",e=>{
const rect=canvas.getBoundingClientRect();
const mx=e.clientX-rect.left;
const my=e.clientY-rect.top;

const angle=Math.atan2(my-player.y,mx-player.x);

bullets.push({
x:player.x,
y:player.y,
dx:Math.cos(angle)*10,
dy:Math.sin(angle)*10
});
});

function spawnZombie(){
let side=Math.floor(Math.random()*4);
let x,y;

if(side==0){x=0;y=Math.random()*650;}
if(side==1){x=1000;y=Math.random()*650;}
if(side==2){x=Math.random()*1000;y=0;}
if(side==3){x=Math.random()*1000;y=650;}

zombies.push({
x,y,r:20,speed:1+Math.random()*1.5
});
}

setInterval(spawnZombie,1000);

function spawnPowerup(x,y){

if(Math.random()<0.35){

powerups.push({
x,y,
type:Math.random()<0.6?"popcorn":"speed"
});

}

}

function update(){

if(keys["w"])player.y-=player.speed;
if(keys["s"])player.y+=player.speed;
if(keys["a"])player.x-=player.speed;
if(keys["d"])player.x+=player.speed;

player.x=Math.max(0,Math.min(canvas.width,player.x));
player.y=Math.max(0,Math.min(canvas.height,player.y));

bullets.forEach((b,i)=>{
b.x+=b.dx;
b.y+=b.dy;

if(b.x<0||b.x>1000||b.y<0||b.y>650)
bullets.splice(i,1);
});

zombies.forEach((z,zi)=>{

let ang=Math.atan2(player.y-z.y,player.x-z.x);

z.x+=Math.cos(ang)*z.speed;
z.y+=Math.sin(ang)*z.speed;

let d=Math.hypot(player.x-z.x,player.y-z.y);

if(d<player.r+z.r){

player.health-=0.2;

}

bullets.forEach((b,bi)=>{

if(Math.hypot(b.x-z.x,b.y-z.y)<z.r){

bullets.splice(bi,1);
zombies.splice(zi,1);
score++;

spawnPowerup(z.x,z.y);

}

});

});

powerups.forEach((p,i)=>{

if(Math.hypot(player.x-p.x,player.y-p.y)<30){

if(p.type=="popcorn"){

player.health=Math.min(100,player.health+25);

}

if(p.type=="speed"){

player.speed=7;
setTimeout(()=>player.speed=4,5000);

}

powerups.splice(i,1);

}

});

document.getElementById("health").textContent=Math.floor(player.health);
document.getElementById("score").textContent=score;

if(player.health<=0){

alert("Game Over! Score: "+score);
location.reload();

}

}

function draw(){

ctx.clearRect(0,0,1000,650);

ctx.fillStyle="deepskyblue";
ctx.beginPath();
ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="yellow";
bullets.forEach(b=>{
ctx.beginPath();
ctx.arc(b.x,b.y,4,0,Math.PI*2);
ctx.fill();
});

ctx.fillStyle="green";
zombies.forEach(z=>{
ctx.beginPath();
ctx.arc(z.x,z.y,z.r,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="red";
ctx.fillRect(z.x-10,z.y-20,20,4);
ctx.fillStyle="green";
});

powerups.forEach(p=>{

if(p.type=="popcorn"){

ctx.fillStyle="gold";
ctx.font="28px Arial";
ctx.fillText("🍿",p.x-10,p.y+10);

}else{

ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(p.x,p.y,10,0,Math.PI*2);
ctx.fill();

}

});

}

function loop(){

update();
draw();
requestAnimationFrame(loop);

}

loop();
</script>

</body>
</html>
